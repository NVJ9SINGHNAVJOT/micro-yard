<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vitals</title>
  <link rel="stylesheet" href="shared/typography.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">V</div>
      <div class="brand-text">
        <span class="brand-title">Vitals</span>
        <span class="brand-sub">System &amp; service monitor</span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="updated" class="updated"></span>
      <span id="status" class="status">
        <span class="status-dot"></span><span id="statusText">connecting…</span>
      </span>
    </div>
  </header>

  <main>
    <section class="panel col-system">
      <div class="panel-header"><h2>System</h2></div>
      <div class="panel-body">
        <div class="system-grid">
          <div class="stat-card">
            <canvas class="gauge" data-metric="cpu"></canvas>
            <span class="stat-label">CPU</span>
          </div>
          <div class="stat-card">
            <canvas class="gauge" data-metric="mem"></canvas>
            <span class="stat-label">RAM</span>
          </div>
          <div class="stat-card">
            <canvas class="gauge" data-metric="gpu"></canvas>
            <span class="stat-label">GPU</span>
          </div>
        </div>
      </div>
    </section>

    <section class="panel col-graphs">
      <div class="panel-header">
        <h2>Timeline</h2>
        <div class="controls">
          <button id="liveBtn" class="live-btn on" title="Follow live and auto-refresh">
            <span class="dot"></span><span id="liveLabel">Live</span>
          </button>
          <span class="divider"></span>
          <label class="ctl">From
            <input type="datetime-local" id="fromInput" />
          </label>
          <label class="ctl">To
            <input type="datetime-local" id="toInput" />
          </label>
          <div class="presets">
            <button data-range="300">5m</button>
            <button data-range="900">15m</button>
            <button data-range="3600">1h</button>
            <button data-range="21600">6h</button>
            <button data-range="today">Today</button>
          </div>
        </div>
      </div>

      <div class="panel-body">
        <div class="chart-block">
          <div class="chart-title">
            <span>System usage</span>
            <span class="legend">
              <span style="--c:#58a6ff"><i></i>CPU</span>
              <span style="--c:#3fb950"><i></i>RAM</span>
              <span style="--c:#bc8cff"><i></i>GPU</span>
            </span>
          </div>
          <div class="chart-wrap">
            <canvas id="sysChart"></canvas>
            <div id="sysTip" class="chart-tip"></div>
          </div>
        </div>

        <div class="svc-filter-row">
          <span class="filter-label">Services</span>
          <div id="svcFilter" class="svc-filter"></div>
        </div>

        <div class="chart-block">
          <div class="chart-title"><span>Services — CPU %</span></div>
          <div class="chart-wrap">
            <canvas id="svcCpuChart"></canvas>
            <div id="svcCpuTip" class="chart-tip"></div>
          </div>
        </div>

        <div class="chart-block">
          <div class="chart-title"><span>Services — RAM (MB)</span></div>
          <div class="chart-wrap">
            <canvas id="svcRamChart"></canvas>
            <div id="svcRamTip" class="chart-tip"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel col-services">
      <div class="panel-header"><h2>Services</h2></div>
      <div class="panel-body">
        <div id="services" class="services-grid"></div>
      </div>
    </section>
  </main>

  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
