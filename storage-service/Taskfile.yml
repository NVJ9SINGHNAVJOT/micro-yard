version: '3'

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  sync-shared:
    desc: Sync shared UI assets (typography, fonts) from ui-shared/ into web/shared/
    cmds:
      - rm -rf web/shared
      - mkdir -p web/shared/fonts
      - cp ../ui-shared/typography.css web/shared/typography.css
      - cp ../ui-shared/fonts/*.woff2 web/shared/fonts/

  build:
    desc: Build server and web dashboard binaries to bin/
    deps: [sync-shared]
    cmds:
      - go build -o bin/server ./cmd/server/
      - go build -o bin/dashboard ./cmd/web/

  run:
    desc: Run the server
    cmds:
      - go run ./cmd/server/

  web:
    desc: Run the web dashboard (requires the API server to be running)
    deps: [sync-shared]
    cmds:
      - go run ./cmd/web/

  start:
    desc: Build and run the compiled server binary
    deps: [build]
    cmds:
      - ./bin/server

  start-web:
    desc: Build and run the compiled web dashboard binary
    deps: [build]
    cmds:
      - ./bin/dashboard

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  fmt:
    desc: Format all Go source files
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet across all packages
    cmds:
      - go vet ./...

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  check:
    desc: Format, vet, and build (run before committing)
    cmds:
      - task: fmt
      - task: vet
      - task: build
