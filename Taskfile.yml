version: '3'

# Root taskfile: delegates into each service, namespaced.
#   task storage:run   task vitals:run   task <service>:<task>
# Run `task` with no args to list everything.
includes:
  storage:
    taskfile: ./storage-service/Taskfile.yml
    dir: ./storage-service
  vitals:
    taskfile: ./vitals-service/Taskfile.yml
    dir: ./vitals-service

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  sync-shared:
    desc: Sync shared UI assets (ui-shared/) into every service that uses them
    cmds:
      - task: storage:sync-shared
      - task: vitals:sync-shared

  check:
    desc: Run each service's check (fmt + vet + build)
    cmds:
      - task: storage:check
      - task: vitals:check
